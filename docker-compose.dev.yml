services:
  web:
    build:
      context: .
      target: deps          # only install deps, skip the full prod build
    image: bankai:dev
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      # Mount source for hot reload; keep node_modules from the image
      - .:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - .env.local
    environment:
      NODE_ENV: development
    restart: unless-stopped
